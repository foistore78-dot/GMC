<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#e94560" stroke-width="4"/>
  
  <!-- Guitar body shape -->
  <ellipse cx="100" cy="130" rx="32" ry="38" fill="none" stroke="#e94560" stroke-width="3"/>
  <ellipse cx="100" cy="130" rx="20" ry="24" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Guitar neck -->
  <rect x="95" y="48" width="10" height="60" rx="3" fill="#e94560"/>
  
  <!-- Guitar head -->
  <rect x="88" y="38" width="24" height="16" rx="4" fill="#c73652"/>
  
  <!-- Guitar strings -->
  <line x1="94" y1="48" x2="94" y2="108" stroke="#ffd700" stroke-width="1"/>
  <line x1="97" y1="48" x2="97" y2="108" stroke="#ffd700" stroke-width="1"/>
  <line x1="100" y1="48" x2="100" y2="108" stroke="#ffd700" stroke-width="1"/>
  <line x1="103" y1="48" x2="103" y2="108" stroke="#ffd700" stroke-width="1"/>
  <line x1="106" y1="48" x2="106" y2="108" stroke="#ffd700" stroke-width="1"/>
  
  <!-- Guitar sound hole -->
  <circle cx="100" cy="130" r="10" fill="none" stroke="#e94560" stroke-width="2"/>
  
  <!-- Music notes -->
  <text x="52" y="95" font-size="22" fill="#ffd700" font-family="serif">♪</text>
  <text x="140" y="82" font-size="16" fill="#ffd700" font-family="serif">♫</text>
  
  <!-- Text: GMC -->
  <text x="100" y="186" font-size="14" fill="#e94560" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="4">GMC</text>
</svg>
